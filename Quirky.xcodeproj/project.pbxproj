			shellScript = "# Mac App Store forbids third-party updaters. The Sparkle framework\n# is still in the SPM dependency list (so the Direct build keeps\n# auto-update support), but for the MAS configuration we delete the\n# framework from the embedded bundle and re-sign the result.\nif [ \"$CONFIGURATION\" != \"MAS Release\" ]; then\n  exit 0\nfi\nSPARKLE=\"$CODESIGNING_FOLDER_PATH/Contents/Frameworks/Sparkle.framework\"\nif [ -d \"$SPARKLE\" ]; then\n  echo \"==> MAS build: removing $SPARKLE\"\n  rm -rf \"$SPARKLE\"\nfi\n# Re-sign the bundle so the embedded code-directory hashes match the\n# now-smaller bundle layout. Skipped for ad-hoc / unsigned local builds\n# (where EXPANDED_CODE_SIGN_IDENTITY is empty or '-').\nif [ -n \"$EXPANDED_CODE_SIGN_IDENTITY\" ] && [ \"$EXPANDED_CODE_SIGN_IDENTITY\" != \"-\" ]; then\n  /usr/bin/codesign --force --options=runtime --timestamp \\\n    --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" \\\n    --entitlements \"$CODE_SIGN_ENTITLEMENTS\" \\\n    \"$CODESIGNING_FOLDER_PATH\"\nelse\n  echo \"==> MAS build: skipping re-sign (ad-hoc/unsigned local build)\"\nfi\n";
