<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6F6FA"/>
      <stop offset="1" stop-color="#D6D6E0"/>
    </linearGradient>
    <linearGradient id="bgHi" x1="0" y1="0" x2="0" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCFCFE"/>
      <stop offset="0.42" stop-color="#86899B"/>
      <stop offset="0.85" stop-color="#2A2D38"/>
      <stop offset="1" stop-color="#15161D"/>
    </linearGradient>
    <linearGradient id="topGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>

    <g id="dashH">
      <rect x="0" y="9" width="200" height="44" rx="20" fill="#0A0810" opacity="0.22"/>
      <rect x="0" y="0" width="200" height="44" rx="20" fill="url(#glassFill)"/>
      <rect x="7" y="3" width="186" height="15" rx="7" fill="url(#topGloss)"/>
      <rect x="0.6" y="0.6" width="198.8" height="42.8" rx="19.4" fill="none" stroke="url(#bezel)" stroke-width="1.2"/>
    </g>
    <g id="dashV">
      <rect x="9" y="0" width="44" height="130" rx="20" fill="#0A0810" opacity="0.22"/>
      <rect x="0" y="0" width="44" height="130" rx="20" fill="url(#glassFill)"/>
      <rect x="3" y="3" width="38" height="15" rx="7" fill="url(#topGloss)"/>
      <rect x="0.6" y="0.6" width="42.8" height="128.8" rx="19.4" fill="none" stroke="url(#bezel)" stroke-width="1.2"/>
    </g>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="520" rx="224" fill="url(#bgHi)"/>

  <use xlink:href="#dashH" x="152" y="292"/>
  <use xlink:href="#dashH" x="412" y="292"/>
  <use xlink:href="#dashH" x="672" y="292"/>

  <use xlink:href="#dashH" x="152" y="688"/>
  <use xlink:href="#dashH" x="412" y="688"/>
  <use xlink:href="#dashH" x="672" y="688"/>

  <use xlink:href="#dashV" x="152" y="362"/>
  <use xlink:href="#dashV" x="152" y="532"/>

  <use xlink:href="#dashV" x="828" y="362"/>
  <use xlink:href="#dashV" x="828" y="532"/>
</svg>
