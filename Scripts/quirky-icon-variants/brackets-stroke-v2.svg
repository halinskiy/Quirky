<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EBEBEF"/>
    </linearGradient>
    <linearGradient id="bgGloss" x1="0" y1="0" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bracketGrad" x1="0" y1="240" x2="0" y2="784" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3A3A42"/>
      <stop offset="0.5" stop-color="#0E0E14"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="topGloss" x1="0" y1="240" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bottomShade" x1="0" y1="520" x2="0" y2="784" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.45"/>
    </linearGradient>

    <filter id="blurTight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="500" rx="224" fill="url(#bgGloss)"/>
  <rect x="2" y="2" width="1020" height="1020" rx="222" fill="none" stroke="#000000" stroke-width="1.5" stroke-opacity="0.08"/>

  <g filter="url(#blurTight)" opacity="0.55" transform="translate(0, 7)">
    <g stroke="#000000" stroke-width="56" stroke-linecap="round" fill="none">
      <path d="M 152 400 L 152 320 A 80 80 0 0 1 232 240 L 312 240"/>
      <path d="M 872 400 L 872 320 A 80 80 0 0 0 792 240 L 712 240"/>
      <path d="M 872 624 L 872 704 A 80 80 0 0 1 792 784 L 712 784"/>
      <path d="M 152 624 L 152 704 A 80 80 0 0 0 232 784 L 312 784"/>
    </g>
  </g>

  <g stroke="url(#bracketGrad)" stroke-width="56" stroke-linecap="round" fill="none">
    <path d="M 152 400 L 152 320 A 80 80 0 0 1 232 240 L 312 240"/>
    <path d="M 872 400 L 872 320 A 80 80 0 0 0 792 240 L 712 240"/>
    <path d="M 872 624 L 872 704 A 80 80 0 0 1 792 784 L 712 784"/>
    <path d="M 152 624 L 152 704 A 80 80 0 0 0 232 784 L 312 784"/>
  </g>

  <g stroke="url(#bottomShade)" stroke-width="56" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M 152 400 L 152 320 A 80 80 0 0 1 232 240 L 312 240"/>
    <path d="M 872 400 L 872 320 A 80 80 0 0 0 792 240 L 712 240"/>
    <path d="M 872 624 L 872 704 A 80 80 0 0 1 792 784 L 712 784"/>
    <path d="M 152 624 L 152 704 A 80 80 0 0 0 232 784 L 312 784"/>
  </g>

  <g transform="translate(-2, -3)" opacity="0.85">
    <g stroke="url(#topGloss)" stroke-width="14" stroke-linecap="round" fill="none">
      <path d="M 152 400 L 152 320 A 80 80 0 0 1 232 240 L 312 240"/>
      <path d="M 872 400 L 872 320 A 80 80 0 0 0 792 240 L 712 240"/>
      <path d="M 872 624 L 872 704 A 80 80 0 0 1 792 784 L 712 784"/>
      <path d="M 152 624 L 152 704 A 80 80 0 0 0 232 784 L 312 784"/>
    </g>
